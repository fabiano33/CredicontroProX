<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CrediControl Pro | Juros Recorrentes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%); }
        .card-hover { transition: all 0.3s; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15); }
        .progress-bar { transition: width 0.5s ease-out; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 1000; animation: toastFade 3s ease forwards; }
        @keyframes toastFade { 0% { opacity: 0; transform: translateX(-50%) translateY(20px); } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .badge { padding: 4px 8px; font-size: 10px; font-weight: bold; border-radius: 9999px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black bg-gradient-to-r from-blue-700 to-indigo-700 bg-clip-text text-transparent flex items-center gap-2">
                    <i data-lucide="calculator" class="w-8 h-8 text-blue-600"></i>
                    CrediControl Pro+
                </h1>
                <p class="text-sm text-gray-600 mt-1">Gestão de Crédito e Juros Recorrentes</p>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirModalCliente()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg transition flex items-center gap-2">
                    <i data-lucide="user-plus" class="w-5 h-5"></i> Novo Cliente
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8">
            <div class="bg-white rounded-2xl p-5 shadow-md">
                <p class="text-xs font-bold text-gray-400 uppercase">Principal</p>
                <p class="text-2xl font-black text-gray-800" id="totalPrincipal">R$ 0</p>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-md">
                <p class="text-xs font-bold text-gray-400 uppercase">Juros Totais</p>
                <p class="text-2xl font-black text-amber-600" id="totalJuros">R$ 0</p>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-md">
                <p class="text-xs font-bold text-gray-400 uppercase">Total Pago</p>
                <p class="text-2xl font-black text-emerald-600" id="totalPago">R$ 0</p>
            </div>
            <div class="bg-white rounded-2xl p-5 shadow-md">
                <p class="text-xs font-bold text-gray-400 uppercase">Descontos</p>
                <p class="text-2xl font-black text-purple-600" id="totalDescontos">R$ 0</p>
            </div>
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-5 shadow-md">
                <p class="text-xs font-bold text-blue-100 uppercase">Saldo Devedor</p>
                <p class="text-2xl font-black text-white" id="saldoGlobal">R$ 0</p>
            </div>
        </div>

        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2"><i data-lucide="users" class="w-5 h-5"></i> Clientes</h2>
            <button onclick="aplicarJurosRecorrentes()" class="text-xs bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-full font-bold shadow-sm transition">
                📈 Aplicar Juros Geral (Mês)
            </button>
        </div>
        
        <div id="clientesContainer" class="space-y-4"></div>
    </div>

    <div id="modalCliente" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800" id="modalClienteTitle">Novo Cliente</h3>
                <button onclick="fecharModalCliente()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="formCliente">
                <input type="hidden" id="clienteEditId">
                <div class="mb-4"><label class="block text-sm font-bold text-gray-700 mb-1">Nome *</label><input type="text" id="clienteNome" required class="w-full border rounded-lg p-3 text-sm"></div>
                <div class="mb-4"><label class="block text-sm font-bold text-gray-700 mb-1">Telefone (com DDD)</label><input type="text" id="clienteTelefone" placeholder="31999999999" class="w-full border rounded-lg p-3 text-sm"></div>
                <div class="mb-4"><label class="block text-sm font-bold text-gray-700 mb-1">Email</label><input type="email" id="clienteEmail" class="w-full border rounded-lg p-3 text-sm"></div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">Salvar</button>
                    <button type="button" onclick="fecharModalCliente()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-xl">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalOperacao" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-gray-800">Nova Operação</h3>
                <button onclick="fecharModalOperacao()" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <form id="formOperacao">
                <input type="hidden" id="operacaoClienteId">
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Tipo *</label>
                    <select id="operacaoTipo" class="w-full border rounded-lg p-3 text-sm">
                        <option value="emprestimo">💰 Empréstimo</option>
                        <option value="pagamento">💵 Pagamento</option>
                        <option value="desconto">🎯 Desconto</option>
                        <option value="juros">📈 Juros (avulso)</option>
                    </select>
                </div>
                <div class="mb-4"><label class="block text-sm font-bold text-gray-700 mb-1">Valor (R$)</label><input type="text" id="operacaoValor" class="w-full border rounded-lg p-3 text-sm" placeholder="0,00"></div>
                <div class="mb-4" id="campoTaxa"><label class="block text-sm font-bold text-gray-700 mb-1">Taxa de Juros Mensal (%)</label><input type="text" id="operacaoTaxa" class="w-full border rounded-lg p-3 text-sm" placeholder="5"></div>
                <div class="mb-4"><label class="block text-sm font-bold text-gray-700 mb-1">Data</label><input type="date" id="operacaoData" class="w-full border rounded-lg p-3 text-sm"></div>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl">Registrar</button>
                    <button type="button" onclick="fecharModalOperacao()" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-xl">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let clientes = JSON.parse(localStorage.getItem("credicontrol_juros")) || [];
        
        function formatBRL(v) { return v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
        function parseBRL(v) { return parseFloat((v || '0').replace(/\./g, '').replace(',', '.')) || 0; }
        
        function mostrarToast(msg) {
            let toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function recalcularCliente(cliente) {
            let principal = 0, jurosCobrados = 0, pago = 0, descontos = 0, saldo = 0;
            cliente.historico = cliente.historico || [];
            let historicoOrdenado = [...cliente.historico].sort((a,b) => new Date(a.data) - new Date(b.data));
            
            for(let op of historicoOrdenado) {
                if(op.tipo === 'emprestimo') { principal += op.valor; saldo += op.valor; } 
                else if(op.tipo === 'juros') { jurosCobrados += op.valor; saldo += op.valor; }
                else if(op.tipo === 'pagamento') { pago += op.valor; saldo -= op.valor; }
                else if(op.tipo === 'desconto') { descontos += op.valor; saldo -= op.valor; }
            }
            
            cliente.totalPrincipal = principal;
            cliente.totalJuros = jurosCobrados;
            cliente.totalPago = pago;
            cliente.totalDescontos = descontos;
            cliente.saldoDevedor = saldo < 0 ? 0 : saldo;
            
            let totalAbatido = pago + descontos;
            cliente.percentualPagoComJuros = (principal + jurosCobrados) > 0 ? (totalAbatido / (principal + jurosCobrados) * 100) : 0;
            if(cliente.percentualPagoComJuros > 100) cliente.percentualPagoComJuros = 100;
            
            return cliente;
        }

        function compartilharCobranca(id) {
            const c = clientes.find(c => c.id == id);
            if (!c) return;

            const status = c.saldoDevedor <= 0 ? "✅ QUITADO" : "⚠️ PENDENTE";
            const msg = `*RESUMO DE CONTA - CrediControl*\n\n` +
                        `👤 *Cliente:* ${c.nome}\n` +
                        `📊 *Status:* ${status}\n` +
                        `----------------------------\n` +
                        `💰 *Principal:* R$ ${formatBRL(c.totalPrincipal)}\n` +
                        `📈 *Juros Acumulados:* R$ ${formatBRL(c.totalJuros)}\n` +
                        `💵 *Total Pago:* R$ ${formatBRL(c.totalPago)}\n` +
                        `🎯 *Descontos:* R$ ${formatBRL(c.totalDescontos)}\n` +
                        `----------------------------\n` +
                        `🔻 *SALDO DEVEDOR:* R$ ${formatBRL(c.saldoDevedor)}\n\n` +
                        `_Gerado em: ${new Date().toLocaleDateString('pt-BR')}_`;

            if (navigator.share) {
                navigator.share({ title: 'Resumo de Dívida', text: msg }).catch(() => {});
            } else {
                const fone = c.telefone ? c.telefone.replace(/\D/g, '') : '';
                window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }

        // FUNÇÃO PARA APLICAR EM UM CLIENTE ESPECÍFICO
        function aplicarJuroIndividual(id) {
            const c = clientes.find(x => x.id == id);
            if (!c || c.saldoDevedor <= 0) {
                mostrarToast("Cliente sem saldo devedor!");
                return;
            }
            
            if(confirm(`Aplicar juros de ${c.taxaJurosPadrao}% sobre R$ ${formatBRL(c.saldoDevedor)} para ${c.nome}?`)) {
                let dataRef = new Date().toISOString().split('T')[0];
                let valorJuros = c.saldoDevedor * (c.taxaJurosPadrao / 100);
                
                c.historico.push({ tipo: 'juros', valor: valorJuros, data: dataRef, obs: 'Aplicado Individual' });
                c.ultimoJuros = dataRef;
                
                salvarTudo();
                mostrarToast(`Juros aplicado para ${c.nome}!`);
            }
        }
        
        function aplicarJurosRecorrentes() {
            let dataRef = new Date().toISOString().split('T')[0];
            let aplicados = 0;
            clientes.forEach(c => {
                if(c.saldoDevedor > 0) {
                    let hoje = new Date();
                    let ultJuros = c.ultimoJuros ? new Date(c.ultimoJuros) : new Date(0);
                    if(ultJuros.getMonth() !== hoje.getMonth() || ultJuros.getFullYear() !== hoje.getFullYear()) {
                        let valorJuros = c.saldoDevedor * (c.taxaJurosPadrao / 100);
                        c.historico.push({ tipo: 'juros', valor: valorJuros, data: dataRef, obs: 'Automático Geral' });
                        c.ultimoJuros = dataRef;
                        aplicados++;
                    }
                }
            });
            salvarTudo();
            mostrarToast(aplicados > 0 ? `${aplicados} juros aplicados!` : 'Todos os juros já estão em dia.');
        }

        function recalcularGlobais() {
            let p=0, j=0, pg=0, d=0, s=0;
            clientes.forEach(c => { p+=c.totalPrincipal; j+=c.totalJuros; pg+=c.totalPago; d+=c.totalDescontos; s+=c.saldoDevedor; });
            document.getElementById('totalPrincipal').innerText = `R$ ${formatBRL(p)}`;
            document.getElementById('totalJuros').innerText = `R$ ${formatBRL(j)}`;
            document.getElementById('totalPago').innerText = `R$ ${formatBRL(pg)}`;
            document.getElementById('totalDescontos').innerText = `R$ ${formatBRL(d)}`;
            document.getElementById('saldoGlobal').innerText = `R$ ${formatBRL(s)}`;
        }

        function salvarTudo() {
            clientes.forEach(c => recalcularCliente(c));
            localStorage.setItem("credicontrol_juros", JSON.stringify(clientes));
            recalcularGlobais();
            renderizarClientes();
        }

        function renderizarClientes() {
            const container = document.getElementById('clientesContainer');
            if(!clientes.length) { 
                container.innerHTML = '<div class="bg-white p-10 text-center rounded-2xl border-2 border-dashed text-gray-400">Nenhum cliente cadastrado.</div>';
                return;
            }
            container.innerHTML = clientes.map(c => `
                <div class="bg-white rounded-2xl shadow-md overflow-hidden card-hover border border-gray-100">
                    <div class="p-5 cursor-pointer" onclick="toggleHistorico('${c.id}')">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold">${c.nome[0].toUpperCase()}</div>
                                <div><h3 class="font-bold text-gray-800">${c.nome}</h3><p class="text-xs text-gray-400">${c.telefone || 'Sem fone'}</p></div>
                            </div>
                            <div class="text-right">
                                <span class="badge ${c.saldoDevedor > 0 ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}">${c.saldoDevedor > 0 ? 'PENDENTE' : 'QUITADO'}</span>
                                <p class="text-xl font-black ${c.saldoDevedor > 0 ? 'text-red-600' : 'text-emerald-600'}">R$ ${formatBRL(c.saldoDevedor)}</p>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-1.5 mb-2">
                            <div class="bg-blue-600 h-1.5 rounded-full" style="width: ${c.percentualPagoComJuros}%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] font-bold text-gray-400 uppercase">
                            <span>Progresso de Quitação</span>
                            <span>${c.percentualPagoComJuros.toFixed(1)}%</span>
                        </div>
                    </div>
                    <div id="historico-${c.id}" class="hidden bg-gray-50 p-5 border-t border-gray-100">
                        <div class="flex flex-wrap gap-2 mb-4">
                            <button onclick="abrirModalOperacao('${c.id}')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">+ Operação</button>
                            <button onclick="aplicarJuroIndividual('${c.id}')" class="bg-amber-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1">📈 Aplicar Juro</button>
                            <button onclick="compartilharCobranca('${c.id}')" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1"><i data-lucide="share-2" class="w-3 h-3"></i> Enviar</button>
                            <button onclick="editarCliente('${c.id}')" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg text-xs font-bold">Editar</button>
                            <button onclick="excluirCliente('${c.id}')" class="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold">Excluir</button>
                        </div>
                        <div class="bg-white rounded-lg border overflow-hidden">
                            <table class="w-full text-xs">
                                <thead class="bg-gray-50 border-b">
                                    <tr><th class="p-2 text-left">Data</th><th class="p-2 text-left">Tipo</th><th class="p-2 text-right">Valor</th><th class="p-2 text-center">Ação</th></tr>
                                </thead>
                                <tbody>
                                    ${c.historico.sort((a,b)=>new Date(b.data)-new Date(a.data)).map((op, idx) => `
                                        <tr class="border-b">
                                            <td class="p-2">${new Date(op.data).toLocaleDateString('pt-BR')}</td>
                                            <td class="p-2 capitalize">${op.tipo}</td>
                                            <td class="p-2 text-right font-bold">R$ ${formatBRL(op.valor)}</td>
                                            <td class="p-2 text-center"><button onclick="excluirOperacao('${c.id}', ${idx})" class="text-red-400">✕</button></td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Interface
        window.toggleHistorico = (id) => document.getElementById(`historico-${id}`).classList.toggle('hidden');
        function abrirModalCliente() { 
            document.getElementById('formCliente').reset();
            document.getElementById('clienteEditId').value = '';
            document.getElementById('modalClienteTitle').innerText = 'Novo Cliente';
            document.getElementById('modalCliente').style.display = 'flex'; 
        }
        function fecharModalCliente() { document.getElementById('modalCliente').style.display = 'none'; }
        
        document.getElementById('formCliente').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('clienteEditId').value;
            const dados = {
                nome: document.getElementById('clienteNome').value,
                telefone: document.getElementById('clienteTelefone').value,
                email: document.getElementById('clienteEmail').value
            };
            if(id) {
                let c = clientes.find(x => x.id == id);
                Object.assign(c, dados);
                mostrarToast('Cliente atualizado!');
            } else {
                clientes.push({ id: Date.now().toString(), ...dados, historico: [], taxaJurosPadrao: 5 });
                mostrarToast('Cliente cadastrado!');
            }
            salvarTudo(); fecharModalCliente();
        });

        function abrirModalOperacao(id) {
            document.getElementById('operacaoClienteId').value = id;
            document.getElementById('operacaoValor').value = '';
            document.getElementById('operacaoData').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalOperacao').style.display = 'flex';
        }
        function fecharModalOperacao() { document.getElementById('modalOperacao').style.display = 'none'; }

        document.getElementById('formOperacao').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('operacaoClienteId').value;
            const c = clientes.find(x => x.id == id);
            const tipo = document.getElementById('operacaoTipo').value;
            const valor = parseBRL(document.getElementById('operacaoValor').value);
            const taxa = parseBRL(document.getElementById('operacaoTaxa').value);
            
            if(tipo === 'emprestimo' && taxa > 0) c.taxaJurosPadrao = taxa;
            c.historico.push({ tipo, valor, data: document.getElementById('operacaoData').value });
            salvarTudo(); fecharModalOperacao();
            mostrarToast('Operação registrada!');
        });

        function editarCliente(id) {
            const c = clientes.find(x => x.id == id);
            document.getElementById('clienteEditId').value = c.id;
            document.getElementById('clienteNome').value = c.nome;
            document.getElementById('clienteTelefone').value = c.telefone;
            document.getElementById('clienteEmail').value = c.email;
            document.getElementById('modalClienteTitle').innerText = 'Editar Cliente';
            document.getElementById('modalCliente').style.display = 'flex';
        }

        function excluirCliente(id) { if(confirm('Excluir cliente e todo seu histórico?')) { clientes = clientes.filter(x => x.id != id); salvarTudo(); mostrarToast('Cliente removido'); } }
        function excluirOperacao(cid, oidx) { if(confirm('Excluir esta operação?')) { clientes.find(x => x.id == cid).historico.splice(oidx, 1); salvarTudo(); mostrarToast('Operação removida'); } }

        salvarTudo();
    </script>
</body>
</html>
